spring.application.name=deploypertemuan11_20220140054

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/praktikum_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:praktikum_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
